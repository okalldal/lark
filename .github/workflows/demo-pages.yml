# Build and deploy the lark-rs GitHub Pages site.
#
# A repository has exactly one Pages site, so this workflow assembles a single
# artifact from two pieces:
#   /            → the static showcase in lark-rs/site/
#   /playground/ → the WASM playground (lark-rs/wasm/demo/ + the wasm-pack web
#                  build). The browser instantiates the .wasm itself, so there is
#                  nothing to "host" beyond serving the files.
#
# One-time repo setup: Settings → Pages → Source = "GitHub Actions".

name: demo-pages

on:
  push:
    branches: [master]
    paths:
      - 'lark-rs/**'
      - '.github/workflows/demo-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wasm-pack
        working-directory: lark-rs/wasm
        run: npm ci

      - name: Build playground (wasm-pack web build → demo/pkg)
        working-directory: lark-rs/wasm
        run: npm run demo:build

      - name: Assemble Pages site (showcase at root, playground at /playground)
        run: |
          set -eux
          rm -rf _site
          # showcase landing page is the site root
          cp -r lark-rs/site _site
          # the live playground lives under /playground/
          cp -r lark-rs/wasm/demo _site/playground
          # belt-and-braces: keep Jekyll out of the way
          touch _site/.nojekyll
          ls -R _site | head -40

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
