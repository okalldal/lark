name: lark-rs

# PR branches are covered by the `pull_request` trigger alone; `push` is
# master-only so a PR push doesn't run the whole workflow twice (once per
# event). The intended flow is: push the branch, open the PR, and let the PR
# run be THE CI run.
on:
  push:
    branches: [master]
    paths:
      - 'lark-rs/**'
      - 'lark/**'
      - '.githooks/**'
      - '.github/workflows/lark-rs.yml'
  pull_request:
    paths:
      - 'lark-rs/**'
      - 'lark/**'
      - '.githooks/**'
      - '.github/workflows/lark-rs.yml'

# A newer push to the same branch/PR supersedes the in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

defaults:
  run:
    working-directory: lark-rs

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check --all
        working-directory: lark-rs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lark-rs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cargo test
        run: cargo test --all

      # The fancy-oracle differential (docs/LOOKAROUND_SCOPE.md): the default build
      # contains zero fancy-regex code, so the L0 whole-lexer differential
      # (tests/test_scanner_differential.rs, required-features = ["fancy-oracle"])
      # is skipped above and must run explicitly with the TEST-ONLY feature that
      # resurrects the Regex reference backend's fancy side-probes. `-p lark-rs`,
      # not `--all`: the workspace siblings do not define the feature. The
      # differential is the ONLY test target gated on the feature (Cargo.toml
      # required-features), so name it explicitly — running every integration
      # target here would just repeat the Cargo-test step above under a pointless
      # rebuild. `--lib` keeps the lib unit tests in this feature build too:
      # scanner.rs has #[cfg(feature = "fancy-oracle")] code whose unit tests
      # (e.g. global_verbose_flag_refuses_lookaround_lowering) are documented in
      # Cargo.toml as running under both builds.
      - name: Fancy-oracle differential (test-only reference)
        run: cargo test -p lark-rs --features fancy-oracle --lib --test test_scanner_differential

      # Deterministic scaling gates. The work counters in src/perf.rs only exist
      # under the `perf-counters` feature, so these regression nets are a no-op in
      # `cargo test --all` above and must run explicitly. They key on counts (flat
      # per byte / capped n² / cubic envelope), never wall-clock — gateable on a
      # shared runner, unlike the timing bench. One invocation, one build:
      #   * test_earley_scaling          — super-linearity gate (#56)
      #   * test_cyk_scaling             — CYK O(n³·|grammar|) cubic envelope (#87)
      #   * test_lexer_scaling           — flat-per-byte lexer scan work (#104)
      #   * test_lexer_dfa_build_scaling — dense-DFA build cost (LEXER_DFA_PLAN.md,
      #                                    determinization-blowup tripwire)
      #   * test_lalr_table_scaling      — LALR ParseTable density: O(filled) not
      #                                    O(states×terminals) (#367)
      - name: Scaling gates (perf-counters)
        run: >-
          cargo test --features perf-counters
          --test test_earley_scaling
          --test test_cyk_scaling
          --test test_lexer_scaling
          --test test_lexer_dfa_build_scaling
          --test test_lalr_table_scaling

      # python.lark LALR build gate (#79). The headline result of the EBNF-helper
      # dedup is that upstream python.lark's full LALR table now *builds* (without
      # sharing, its repeated `("," X)*` helpers collide as unresolvable R/R). The
      # witness test is `#[ignore]`d because the build is slow (~18s debug), so
      # `cargo test --all` above skips it — it must be run explicitly here, exactly
      # like the perf-counters gates, or nothing continuously guards the goal.
      - name: python.lark LALR build gate (ignored, slow ~18s)
        run: cargo test --lib tests::test_python_lark_builds_under_lalr -- --ignored --exact

      # The oracle JSON is generated from Python Lark and committed so Rust tests
      # run without Python. This gate proves the generators are deterministic and
      # that the committed oracles are in sync with the current Python Lark.
      - name: Oracle freshness (committed oracles must match regeneration)
        run: |
          # `regex` backs the wild bank's synapse_storm grammar, which upstream
          # loads with regex=True (tools/generate_wild_oracles.py).
          pip install regex
          python3 tools/generate_oracles.py
          python3 tools/extract_lark_compliance.py
          python3 tools/generate_wild_oracles.py
          python3 tools/generate_transformer_oracles.py
          if ! git diff --quiet -- tests/fixtures/oracles; then
            echo "::error::Committed oracles are stale. Run tools/generate_oracles.py,"
            echo "tools/extract_lark_compliance.py, tools/generate_wild_oracles.py,"
            echo "and tools/generate_transformer_oracles.py, then commit the changes."
            git --no-pager diff --stat -- tests/fixtures/oracles
            exit 1
          fi

  # The PyO3 binding (lark-rs/python) is a separate cargo package — `cargo test
  # --all` in the `test` job above does NOT build or test it (it isn't a workspace
  # member). Build it with maturin and run its round-trip parity suite against the
  # Python-Lark oracle so the binding is gated on every PR, not just locally.
  python-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lark-rs/python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check formatting (binding crate)
        run: cargo fmt --check
        working-directory: lark-rs/python

      - name: Build the binding and run round-trip tests vs Python Lark
        working-directory: lark-rs/python
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install maturin lark pytest
          maturin develop
          python -m pytest tests/ -v

  # The WASM binding (lark-rs/wasm, #47) is likewise not a workspace member —
  # it targets wasm32-unknown-unknown and is packaged by wasm-pack. Build the
  # npm package and run the JS smoke tests (tests/wasm/), which replay the JSON
  # oracle corpus through the WASM module and compare every tree against the
  # committed Python-Lark output.
  wasm-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lark-rs/wasm

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check formatting (wasm crate)
        run: cargo fmt --check
        working-directory: lark-rs/wasm

      - name: Host-side unit tests (options + serializer)
        run: cargo test
        working-directory: lark-rs/wasm

      - name: Build the npm package (wasm-pack) and run the JS smoke tests
        working-directory: lark-rs/wasm
        run: |
          npm ci
          npm test
