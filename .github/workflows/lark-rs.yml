name: lark-rs

on:
  push:
    paths:
      - 'lark-rs/**'
      - 'lark/**'
      - '.github/workflows/lark-rs.yml'
  pull_request:
    paths:
      - 'lark-rs/**'
      - 'lark/**'
      - '.github/workflows/lark-rs.yml'

defaults:
  run:
    working-directory: lark-rs

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check --all
        working-directory: lark-rs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cargo test
        run: cargo test --all

      # The fancy-oracle differential (docs/LOOKAROUND_SCOPE.md): the default build
      # contains zero fancy-regex code, so the L0 whole-lexer differential
      # (tests/test_scanner_differential.rs, required-features = ["fancy-oracle"])
      # is skipped above and must run explicitly with the TEST-ONLY feature that
      # resurrects the Regex reference backend's fancy side-probes. `-p lark-rs`,
      # not `--all`: the workspace siblings do not define the feature.
      - name: Fancy-oracle differential (test-only reference)
        run: cargo test -p lark-rs --features fancy-oracle

      # Deterministic super-linearity gate (#56). The work counters in src/perf.rs
      # only exist under the `perf-counters` feature, so the scaling regression net
      # is a no-op in `cargo test --all` above and must be run explicitly here. It
      # keys on counts (flat per byte / capped n²), never wall-clock — gateable on a
      # shared runner, unlike the timing bench.
      - name: Earley scaling gate (perf-counters)
        run: cargo test --features perf-counters --test test_earley_scaling

      # CYK scaling gate (#87). CYK is O(n³·|grammar|); this keys on the
      # cyk_table_steps work counter and asserts a cubic envelope (flat per n³),
      # catching a complexity regression in the CNF conversion or DP.
      - name: CYK scaling gate (perf-counters)
        run: cargo test --features perf-counters --test test_cyk_scaling

      # Lexer linear-scan gate (#104 regression net). The `\G`-anchoring fix kept
      # per-position lexing linear, but shipped with only a wall-clock bench. This
      # keys on the lexer_scan_steps work counter and asserts flat-per-byte scan
      # work, so an un-anchored fancy-regex forward-scan (the O(n²) pathology) is
      # caught deterministically rather than by timing.
      - name: Lexer scaling gate (perf-counters)
        run: cargo test --features perf-counters --test test_lexer_scaling

      # Dense-DFA build-cost gate (docs/LEXER_DFA_PLAN.md, determinization-blowup
      # risk). Lowering bounded lookaround into the combined DFA is paid at build
      # time, and the L5 bake serializes that determinized dense DFA — so a lowering
      # that blows up determinization inflates the bake target invisibly to the
      # runtime differential. This keys on the dense_build_bytes work counter and
      # asserts the determinized size stays flat per terminal and per guard width.
      - name: Lexer DFA build-cost gate (perf-counters)
        run: cargo test --features perf-counters --test test_lexer_dfa_build_scaling

      # python.lark LALR build gate (#79). The headline result of the EBNF-helper
      # dedup is that upstream python.lark's full LALR table now *builds* (without
      # sharing, its repeated `("," X)*` helpers collide as unresolvable R/R). The
      # witness test is `#[ignore]`d because the build is slow (~18s debug), so
      # `cargo test --all` above skips it — it must be run explicitly here, exactly
      # like the perf-counters gates, or nothing continuously guards the goal.
      - name: python.lark LALR build gate (ignored, slow ~18s)
        run: cargo test --lib tests::test_python_lark_builds_under_lalr -- --ignored --exact

      # The oracle JSON is generated from Python Lark and committed so Rust tests
      # run without Python. This gate proves the generators are deterministic and
      # that the committed oracles are in sync with the current Python Lark.
      - name: Oracle freshness (committed oracles must match regeneration)
        run: |
          # `regex` backs the wild bank's synapse_storm grammar, which upstream
          # loads with regex=True (tools/generate_wild_oracles.py).
          pip install regex
          python3 tools/generate_oracles.py
          python3 tools/extract_lark_compliance.py
          python3 tools/generate_wild_oracles.py
          if ! git diff --quiet -- tests/fixtures/oracles; then
            echo "::error::Committed oracles are stale. Run tools/generate_oracles.py,"
            echo "tools/extract_lark_compliance.py, and tools/generate_wild_oracles.py,"
            echo "then commit the changes."
            git --no-pager diff --stat -- tests/fixtures/oracles
            exit 1
          fi

  # The PyO3 binding (lark-rs/python) is a separate cargo package — `cargo test
  # --all` in the `test` job above does NOT build or test it (it isn't a workspace
  # member). Build it with maturin and run its round-trip parity suite against the
  # Python-Lark oracle so the binding is gated on every PR, not just locally.
  python-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check formatting (binding crate)
        run: cargo fmt --check
        working-directory: lark-rs/python

      - name: Build the binding and run round-trip tests vs Python Lark
        working-directory: lark-rs/python
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install maturin lark pytest
          maturin develop
          python -m pytest tests/ -v

  # The WASM binding (lark-rs/wasm, #47) is likewise not a workspace member —
  # it targets wasm32-unknown-unknown and is packaged by wasm-pack. Build the
  # npm package and run the JS smoke tests (tests/wasm/), which replay the JSON
  # oracle corpus through the WASM module and compare every tree against the
  # committed Python-Lark output.
  wasm-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check formatting (wasm crate)
        run: cargo fmt --check
        working-directory: lark-rs/wasm

      - name: Host-side unit tests (options + serializer)
        run: cargo test
        working-directory: lark-rs/wasm

      - name: Build the npm package (wasm-pack) and run the JS smoke tests
        working-directory: lark-rs/wasm
        run: |
          npm ci
          npm test
