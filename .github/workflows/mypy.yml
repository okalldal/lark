name: Python type check
# PR branches are covered by `pull_request`; `push` is master-only so a PR
# push doesn't run the jobs twice.
on:
  push:
    branches: [master]
    paths:
      - 'lark/**'
      - '*.py'
      - 'setup.cfg'
      - 'tox.ini'
      - '.pre-commit-config.yaml'
      - '.github/workflows/mypy.yml'
  pull_request:
    paths:
      - 'lark/**'
      - '*.py'
      - 'setup.cfg'
      - 'tox.ini'
      - '.pre-commit-config.yaml'
      - '.github/workflows/mypy.yml'
jobs:
  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Lint with mypy
        run: pipx run tox -e type

  pre-commit:
    name: Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
    - uses: pre-commit/action@v3.0.1
