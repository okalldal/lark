# To use:
#
#     pre-commit run -a
#
# Or:
#
#     pre-commit install  # (runs every time you commit in git)
#
# To update this file:
#
#     pre-commit autoupdate
#
# See https://github.com/pre-commit/pre-commit

repos:
# Standard hooks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: "v4.4.0"
  hooks:
    - id: check-added-large-files
    - id: check-case-conflict
    - id: check-merge-conflict
    - id: check-symlinks
    - id: check-toml
    - id: check-yaml
    - id: debug-statements
    - id: end-of-file-fixer
      exclude: '(^tests/.*\.lark$|^lark-rs/tests/wild/.*/(grammar|inputs)/|\.svg$)'
    - id: mixed-line-ending
      # Same rationale as the fixers below: the wild-bank corpus is vendored
      # byte-exact from upstream; a line-ending rewrite would corrupt it.
      exclude: '(^lark-rs/tests/wild/.*/(grammar|inputs)/|\.svg$)'
    - id: requirements-txt-fixer
    - id: trailing-whitespace
      exclude: '(^tests/.*\.lark$|^lark-rs/tests/wild/.*/(grammar|inputs)/|\.svg$)'
